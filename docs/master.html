<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> ∞ </title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0d0e11;
      --surface:   #13151a;
      --surface2:  #1a1d24;
      --border:    #252830;
      --border2:   #2e3240;
      --text:      #c8cad4;
      --text-dim:  #5a5f72;
      --text-mute: #393d4d;
      --accent:    #4f8ef7;
      --accent2:   #7c6af5;
      --green:     #3ecf82;
      --amber:     #f5a623;
      --red:       #f25f5c;
      --glow:      rgba(79, 142, 247, 0.12);
      --radius:    10px;
      --font-body: 'DM Mono', monospace;
      --font-head: 'Syne', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Noise overlay ────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ─── Layout Shell ─────────────────────────────────── */
    #shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 220px 1fr;
      grid-template-rows: 48px 1fr;
      min-height: 100vh;
    }

    /* ─── Topbar ───────────────────────────────────────── */
    #topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .wordmark {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 15px;
      letter-spacing: -0.02em;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      flex-shrink: 0;
    }
    .wordmark .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.75); }
    }

    .divider-v { width: 1px; height: 20px; background: var(--border2); flex-shrink: 0; }

    #search-wrap {
      flex: 1;
      max-width: 380px;
      position: relative;
    }
    #search-wrap .icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
      font-size: 11px;
    }
    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 10px 6px 30px;
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #search::placeholder { color: var(--text-mute); }
    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    #kbd-hint {
      font-size: 10px;
      color: var(--text-mute);
      display: flex;
      gap: 4px;
      align-items: center;
      flex-shrink: 0;
    }
    kbd {
      display: inline-flex;
      align-items: center;
      padding: 1px 5px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 4px;
      font-family: var(--font-body);
      font-size: 10px;
      color: var(--text-dim);
    }

    .top-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      font-size: 13px;
    }
    .btn-icon:hover {
      background: var(--surface2);
      border-color: var(--border);
      color: var(--text);
    }
    .btn-icon.active {
      background: var(--glow);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ─── Sidebar ──────────────────────────────────────── */
    #sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 0;
      overflow-y: auto;
      position: sticky;
      top: 48px;
      height: calc(100vh - 48px);
    }

    .sidebar-label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-mute);
      padding: 0 16px 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 16px;
      font-size: 12px;
      color: var(--text-dim);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.15s;
      user-select: none;
    }
    .nav-item:hover {
      color: var(--text);
      background: var(--surface2);
    }
    .nav-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: var(--glow);
    }
    .nav-item .nav-icon { width: 16px; text-align: center; font-size: 12px; }
    .nav-count {
      margin-left: auto;
      font-size: 10px;
      color: var(--text-mute);
      background: var(--surface2);
      padding: 1px 5px;
      border-radius: 4px;
    }

    .sidebar-sep {
      height: 1px;
      background: var(--border);
      margin: 10px 16px;
    }

    /* ─── Main Content ─────────────────────────────────── */
    #main {
      padding: 28px 32px;
      overflow-y: auto;
    }

    /* ─── Section ──────────────────────────────────────── */
    .section-block {
      margin-bottom: 32px;
      animation: fadeUp 0.3s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      cursor: pointer;
      user-select: none;
    }
    .section-header h2 {
      font-family: var(--font-head);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
    }
    .section-tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 500;
    }
    .tag-admin   { background: rgba(79,142,247,0.12); color: var(--accent); }
    .tag-client  { background: rgba(62,207,130,0.12); color: var(--green); }
    .tag-internal{ background: rgba(124,106,245,0.12); color: var(--accent2); }
    .tag-tools   { background: rgba(245,166,35,0.12);  color: var(--amber); }
    .tag-comms   { background: rgba(242,95,92,0.12);   color: var(--red); }

    .section-chevron {
      margin-left: auto;
      color: var(--text-mute);
      font-size: 10px;
      transition: transform 0.2s;
    }
    .section-block.collapsed .section-chevron { transform: rotate(-90deg); }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .section-body {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
    }
    .section-block.collapsed .section-body {
      max-height: 0 !important;
      opacity: 0;
      pointer-events: none;
    }

    /* ─── Link Card ────────────────────────────────────── */
    .link-card {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .link-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.2s;
    }
    .link-card:hover {
      border-color: var(--border2);
      background: var(--surface2);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .link-card:hover::before { opacity: 1; }
    .link-card:active { transform: translateY(0); box-shadow: none; }

    .link-card.env-prod .link-card::before { background: var(--red); }

    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-favicon {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      flex-shrink: 0;
      object-fit: contain;
      background: var(--surface2);
    }
    .card-favicon-placeholder {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: var(--text-mute);
    }
    .card-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .card-env {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }
    .env-prod  .card-env { background: rgba(242,95,92,0.15);   color: var(--red); }
    .env-uat   .card-env { background: rgba(245,166,35,0.15);  color: var(--amber); }
    .env-dev   .card-env { background: rgba(62,207,130,0.15);  color: var(--green); }
    .env-ext   .card-env { background: rgba(79,142,247,0.15);  color: var(--accent); }

    .card-url {
      font-size: 10px;
      color: var(--text-mute);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-desc {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .card-tag {
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 3px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-mute);
    }

    /* ─── Search Empty State ───────────────────────────── */
    #empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 60px 0;
      color: var(--text-mute);
    }
    #empty-state.visible { display: flex; }
    #empty-state .big { font-size: 28px; }
    #empty-state p { font-size: 12px; }

    /* ─── Compact Mode ─────────────────────────────────── */
    body.compact .section-body {
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 4px;
    }
    body.compact .link-card { padding: 8px 10px; }
    body.compact .card-desc,
    body.compact .card-tags,
    body.compact .card-url { display: none; }

    /* ─── Scrollbar ────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-mute); }

    /* ─── Tooltip ──────────────────────────────────────── */
    [data-tip] { position: relative; }
    [data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 5px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 200;
    }

    /* ─── Status Bar ───────────────────────────────────── */
    #statusbar {
      position: fixed;
      bottom: 0;
      left: 220px;
      right: 0;
      height: 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 16px;
      font-size: 10px;
      color: var(--text-mute);
      z-index: 50;
    }
    #statusbar .dot-green {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
    }
    #statusbar span b { color: var(--text-dim); font-weight: 500; }

    /* ─── Highlighted search match ─────────────────────── */
    mark {
      background: rgba(79,142,247,0.25);
      color: var(--accent);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ─── Responsive ───────────────────────────────────── */
    @media (max-width: 720px) {
      #shell { grid-template-columns: 1fr; }
      #sidebar { display: none; }
      #statusbar { left: 0; }
    }
  </style>
</head>

<div id="shell">

  <!-- Topbar -->
  <header id="topbar">
    <div class="wordmark">
      <div class="dot"></div>
      wink
    </div>
    <div class="divider-v"></div>

    <div class="top-actions">
      <button id="btn-compact" class="btn-icon" data-tip="Compact view" onclick="toggleCompact()">⊟</button>
      <button id="btn-collapse" class="btn-icon" data-tip="Collapse all" onclick="collapseAll()">⊞</button>
    </div>
  </header>

  <!-- Sidebar -->
  <nav id="sidebar">
    <div class="sidebar-label">Workspace</div>
    <div class="nav-item active" data-target="all" onclick="filterSection(this, 'all')">
      <span class="nav-icon">⊹</span> All Resources <span class="nav-count" id="count-all">0</span>
    </div>

    <div class="sidebar-sep"></div>
    <div class="sidebar-label">Sections</div>

    <div class="nav-item" data-target="sec-admin" onclick="filterSection(this, 'sec-admin')">
      <span class="nav-icon">⚙</span> Administration <span class="nav-count" id="count-sec-admin">0</span>

    <div class="nav-item" data-target="sec-client" onclick="filterSection(this, 'sec-client')">
      <span class="nav-icon">◈</span> Client-Curated <span class="nav-count" id="count-sec-client">0</span>
    </div>
    <div class="nav-item" data-target="sec-internal" onclick="filterSection(this, 'sec-internal')">
      <span class="nav-icon">⬡</span> Internal Tools <span class="nav-count" id="count-sec-internal">0</span>
    </div>
    <div class="nav-item" data-target="sec-market" onclick="filterSection(this, 'sec-market')">
      <span class="nav-icon">◎</span> Markets & Data <span class="nav-count" id="count-sec-market">0</span>
    </div>
    <div class="nav-item" data-target="sec-comms" onclick="filterSection(this, 'sec-comms')">
      <span class="nav-icon">✉</span> Communications <span class="nav-count" id="count-sec-comms">0</span>
    </div>
    <div class="nav-item" data-target="sec-dev" onclick="filterSection(this, 'sec-dev')">
      <span class="nav-icon">⌥</span> Developer <span class="nav-count" id="count-sec-dev">0</span>
    </div>

    <div class="sidebar-sep"></div>
    <div class="sidebar-label">Pinned</div>
    <div id="pinned-nav">
      <div class="nav-item" style="color: var(--text-mute); font-size:11px; padding-left:18px;">No pins yet</div>
    </div>
  </nav>

  <!-- Main -->
  <main id="main">
    <div id="sections-root"></div>
    <div id="empty-state">
      <div class="big">⌕</div>
      <p>No resources match <span id="empty-query"></span></p>
    </div>
  </main>

</div>

<!-- Status bar -->
<div id="statusbar">
  <div class="dot-green"></div>
  <span><b id="sb-visible">0</b> resources</span>
  <span>·</span>
  <span><b id="sb-sections">0</b> sections</span>
  <span>·</span>
  <span id="sb-time"></span>
</div>

        { name: "Grafana",              href: "#", env: "prod", desc: "Observability and alerting dashboards",     tags: ["monitoring","ops"] },
        { name: "Kibana",               href: "#", env: "prod", desc: "Log aggregation and search",               tags: ["logs","ops"] },
        { name: "go.dev",               href: "https://go.dev",  env: "ext", desc: "Go language docs and packages",               tags: ["go","docs"] },
        { name: "pkg.go.dev",           href: "https://pkg.go.dev", env: "ext", desc: "Go package registry",                       tags: ["go","packages"] },
      ]
    },
  ]
};

// ─── State ─────────────────────────────────────────────────────────────────
let activeFilter = 'all';
let searchQuery  = '';
let compact      = false;

// ─── Favicon Helper ─────────────────────────────────────────────────────────
function faviconEl(href) {
  try {
    const url = new URL(href);
    const img = document.createElement('img');
    img.className = 'card-favicon';
    img.src = `https://www.google.com/s2/favicons?domain=${url.hostname}&sz=32`;
    img.onerror = () => img.replaceWith(placeholder());
    return img;
  } catch {
    return placeholder();
  }
}
function placeholder() {
  const d = document.createElement('div');
  d.className = 'card-favicon-placeholder';
  d.textContent = '⬡';
  return d;
}

// ─── Render ─────────────────────────────────────────────────────────────────
function highlight(str, q) {
  if (!q) return str;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return str.replace(re, '<mark>$1</mark>');
}

function buildCard(link, q) {
  const card = document.createElement('a');
  card.className = 'link-card' + (link.env ? ` env-${link.env}` : '');
  card.href = link.href;
  if (!link.href.startsWith('#')) card.target = '_blank';
  card.rel = 'noopener noreferrer';
  card.dataset.name = (link.name + ' ' + (link.tags||[]).join(' ')).toLowerCase();

  const top = document.createElement('div');
  top.className = 'card-top';
  top.appendChild(faviconEl(link.href));

  const name = document.createElement('span');
  name.className = 'card-name';
  name.innerHTML = highlight(link.name, q);
  top.appendChild(name);

  if (link.env) {
    const env = document.createElement('span');
    env.className = 'card-env';
    env.textContent = link.env;
    top.appendChild(env);
  }
  card.appendChild(top);

  if (link.href && link.href !== '#') {
    try {
      const urlEl = document.createElement('div');
      urlEl.className = 'card-url';
      const parsed = new URL(link.href);
      urlEl.textContent = parsed.hostname + (parsed.pathname !== '/' ? parsed.pathname : '');
      card.appendChild(urlEl);
    } catch {}
  }

  if (link.desc) {
    const desc = document.createElement('div');
    desc.className = 'card-desc';
    desc.innerHTML = highlight(link.desc, q);
    card.appendChild(desc);
  }

  if (link.tags && link.tags.length) {
    const tagsEl = document.createElement('div');
    tagsEl.className = 'card-tags';
    link.tags.forEach(t => {
      const tag = document.createElement('span');
      tag.className = 'card-tag';
      tag.textContent = t;
      tagsEl.appendChild(tag);
    });
    card.appendChild(tagsEl);
  }

  return card;
}

function buildSection(sec, q) {
  const block = document.createElement('div');
  block.className = 'section-block';
  block.id = sec.id;

  const header = document.createElement('div');
  header.className = 'section-header';
  header.onclick = () => {
    block.classList.toggle('collapsed');
    updateBodyHeight(block);
  };

  const h2 = document.createElement('h2');
  h2.textContent = sec.label;
  header.appendChild(h2);

  const tag = document.createElement('span');
  tag.className = `section-tag tag-${sec.tag}`;
  tag.textContent = sec.tag;
  header.appendChild(tag);

  const line = document.createElement('div');
  line.className = 'section-line';
  header.appendChild(line);

  const chev = document.createElement('span');
  chev.className = 'section-chevron';
  chev.textContent = '▾';
  header.appendChild(chev);

  block.appendChild(header);

  const body = document.createElement('div');
  body.className = 'section-body';

  let shown = 0;
  sec.links.forEach(link => {
    const needle = q.toLowerCase();
    const haystack = (link.name + ' ' + link.desc + ' ' + (link.tags||[]).join(' ')).toLowerCase();
    if (!needle || haystack.includes(needle)) {
      body.appendChild(buildCard(link, q));
      shown++;
    }
  });

  block.appendChild(body);

  if (shown === 0) block.style.display = 'none';
  else block.style.display = '';

  return { block, shown };
}

function updateBodyHeight(block) {
  const body = block.querySelector('.section-body');
  if (!block.classList.contains('collapsed')) {
    body.style.maxHeight = body.scrollHeight + 'px';
    body.style.opacity = '1';
  }
}

function render() {
  const root = document.getElementById('sections-root');
  root.innerHTML = '';

  const q = searchQuery.trim();
  let totalVisible = 0;
  let visibleSections = 0;

  CONFIG.sections.forEach(sec => {
    if (activeFilter !== 'all' && activeFilter !== sec.id) return;
    const { block, shown } = buildSection(sec, q);
    root.appendChild(block);
    // trigger height after DOM insertion
    requestAnimationFrame(() => {
      const body = block.querySelector('.section-body');
      body.style.maxHeight = body.scrollHeight + 'px';
    });
    if (shown > 0) visibleSections++;
    totalVisible += shown;

    // update sidebar count
    const countEl = document.getElementById('count-' + sec.id);
    if (countEl) countEl.textContent = shown;
  });

  // total count
  const countAll = document.getElementById('count-all');
  if (countAll) {
    let total = 0;
    CONFIG.sections.forEach(s => { total += s.links.length; });
    countAll.textContent = total;
  }

  document.getElementById('sb-visible').textContent = totalVisible;
  document.getElementById('sb-sections').textContent = visibleSections;

  const empty = document.getElementById('empty-state');
  if (totalVisible === 0) {
    empty.classList.add('visible');
    document.getElementById('empty-query').textContent = `"${q}"`;
  } else {
    empty.classList.remove('visible');
  }

  // animation delays
  root.querySelectorAll('.section-block').forEach((el, i) => {
    el.style.animationDelay = `${i * 40}ms`;
  });
}

// ─── Sidebar Filter ─────────────────────────────────────────────────────────
function filterSection(el, target) {
  activeFilter = target;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  render();
  if (target !== 'all') {
    setTimeout(() => {
      const sec = document.getElementById(target);
      if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
}

// ─── Collapse All ───────────────────────────────────────────────────────────
let allCollapsed = false;
function collapseAll() {
  allCollapsed = !allCollapsed;
  document.querySelectorAll('.section-block').forEach(b => {
    b.classList.toggle('collapsed', allCollapsed);
    if (!allCollapsed) updateBodyHeight(b);
  });
  document.getElementById('btn-collapse').classList.toggle('active', allCollapsed);
}

// ─── Compact Mode ───────────────────────────────────────────────────────────
function toggleCompact() {
  compact = !compact;
  document.body.classList.toggle('compact', compact);
  document.getElementById('btn-compact').classList.toggle('active', compact);
}

// ─── Search ─────────────────────────────────────────────────────────────────
const searchEl = document.getElementById('search');
searchEl.addEventListener('input', () => {
  searchQuery = searchEl.value;
  render();
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== searchEl) {
    e.preventDefault();
    searchEl.focus();
    searchEl.select();
  }
  if (e.key === 'Escape') {
    searchEl.blur();
    searchQuery = '';
    searchEl.value = '';
    render();
  }
});

// ─── Pinned Nav ─────────────────────────────────────────────────────────────
function buildPinnedNav() {
  const container = document.getElementById('pinned-nav');
  container.innerHTML = '';
  const pinned = [];
  CONFIG.sections.forEach(sec => {
    sec.links.forEach(link => {
      if (link.pinned) pinned.push(link);
    });
  });
  if (!pinned.length) {
    container.innerHTML = '<div class="nav-item" style="color: var(--text-mute); font-size:11px; padding-left:18px;">No pins yet</div>';
    return;
  }
  pinned.forEach(link => {
    const item = document.createElement('a');
    item.className = 'nav-item';
    item.href = link.href;
    if (!link.href.startsWith('#')) item.target = '_blank';
    item.rel = 'noopener noreferrer';
    item.innerHTML = `<span class="nav-icon">★</span> ${link.name}`;
    container.appendChild(item);
  });
}

// ─── Status Bar Time ────────────────────────────────────────────────────────
function updateTime() {
  const now = new Date();
  const opts = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
  document.getElementById('sb-time').textContent = now.toLocaleDateString('en-US', opts);
}
updateTime();
setInterval(updateTime, 30000);

// ─── Init ───────────────────────────────────────────────────────────────────
buildPinnedNav();
render();
</script>
</body>
</html>
